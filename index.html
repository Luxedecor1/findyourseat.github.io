<input id="nameInput" placeholder="Enter your full name">
<button onclick="findGuest()">Find my table</button>
<div id="result"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAPkeqsLguRIMuXvseRuMjkN4bTsKBlMOE",
    authDomain: "findyourseat-38c53.firebaseapp.com",
    projectId: "findyourseat-38c53"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const eventId = params.get("event");

  function normalizeName(name) {
    return name.toLowerCase().trim().replace(/\s+/g, " ");
  }

  window.findGuest = async function () {
    const input = normalizeName(document.getElementById("nameInput").value);
    const result = document.getElementById("result");

    if (!input) {
      result.innerText = "Please enter your name.";
      return;
    }

    const guestsRef = collection(db, eventId);
    const q = query(guestsRef, where(hName", "==", input));
    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      result.innerText = "Name not found. Please ask the host.";
      return;
    }

    const guest = snapshot.docs[0].data();
    result.innerHTML = `Welcome ${guest.name}. You are seated at <strong>Table ${guest.table}</strong>.`;
  };
</script>
